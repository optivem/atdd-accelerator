name: release-stage

on:
  release:
    types: [published]

env:
  DOTNET_VERSION: '8.0.x'
  PACKAGE_OUTPUT_DIRECTORY: ${{ github.workspace }}/output
  NUGET_SOURCE_URL: 'https://api.nuget.org/v3/index.json'

jobs:
  build:
    name: 'Build and Test'
    runs-on: ubuntu-latest
    
    steps:
    - name: 'Checkout'
      uses: actions/checkout@v4

    - name: 'Setup .NET'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 'Restore dependencies'
      run: dotnet restore

    - name: 'Build'
      run: dotnet build --configuration Release --no-restore

    - name: 'Pack'
      run: dotnet pack --configuration Release --no-build --output ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

    - name: 'Upload package artifacts'
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ${{ env.PACKAGE_OUTPUT_DIRECTORY }}/*.nupkg

  publish-nuget:
    name: 'Publish to NuGet.org'
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'  # Only publish to NuGet.org on releases
    
    steps:
    - name: 'Download package artifacts'
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

    - name: 'Setup .NET'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 'Publish to NuGet.org'
      run: |
        dotnet nuget push ${{ env.PACKAGE_OUTPUT_DIRECTORY }}/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source ${{ env.NUGET_SOURCE_URL }} \
          --skip-duplicate

  test-tool-installation-nuget:
    name: 'Test Installation from NuGet.org'
    runs-on: ubuntu-latest
    needs: publish-nuget
    if: github.event_name == 'release'  # Only test NuGet.org on releases
    
    steps:
    - name: 'Setup .NET'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 'Install tool from NuGet.org'
      run: |
        max_attempts=30
        attempt=1
        # Remove leading 'v' from tag name if present
        version="${{ github.event.release.tag_name }}"
        version="${version#v}"
        while [ $attempt -le $max_attempts ]; do
          echo "Attempt $attempt to install tool from NuGet.org (version: $version)..."
          if dotnet tool install --global atdd-accelerator-cli --version "$version"; then
            echo "Tool installed successfully."
            break
          else
            echo "Tool not found yet. Waiting 30 seconds before retrying..."
            sleep 30
            attempt=$((attempt + 1))
          fi
        done
        if [ $attempt -gt $max_attempts ]; then
          echo "Failed to install tool after $max_attempts attempts."
          exit 1
        fi

    - name: 'Test tool commands'
      run: |
        atdd
        atdd --help
        atdd --version