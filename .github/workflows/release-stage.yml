name: release-stage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'cli/Optivem.AtddAccelerator.TemplateGenerator.csproj'
  PACKAGE_OUTPUT_DIRECTORY: ${{ github.workspace }}/output
  NUGET_SOURCE_URL: 'https://api.nuget.org/v3/index.json'

jobs:
  build:
    name: 'Build and Test'
    runs-on: ubuntu-latest
    
    steps:
    - name: 'Checkout'
      uses: actions/checkout@v4

    - name: 'Setup .NET'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 'Restore dependencies'
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: 'Build'
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

    - name: 'Pack'
      run: dotnet pack ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

    - name: 'Upload package artifacts'
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ${{ env.PACKAGE_OUTPUT_DIRECTORY }}/*.nupkg

  publish-nuget:
    name: 'Publish to NuGet.org'
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'  # Only publish to NuGet.org on releases
    
    steps:
    - name: 'Download package artifacts'
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

    - name: 'Setup .NET'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 'Publish to NuGet.org'
      run: |
        dotnet nuget push ${{ env.PACKAGE_OUTPUT_DIRECTORY }}/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source ${{ env.NUGET_SOURCE_URL }} \
          --skip-duplicate

  publish-github-packages:
    name: 'Publish to GitHub Packages'
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    
    steps:
    - name: 'Download package artifacts'
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

    - name: 'Setup .NET'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 'Publish to GitHub Packages'
      run: |
        dotnet nuget push ${{ env.PACKAGE_OUTPUT_DIRECTORY }}/*.nupkg \
          --api-key ${{ secrets.GITHUB_TOKEN }} \
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
          --skip-duplicate
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-tool-installation-github:
    name: 'Test Installation from GitHub Packages'
    runs-on: ubuntu-latest
    needs: publish-github-packages
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    
    steps:
    - name: 'Setup .NET'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 'Configure GitHub Packages authentication'
      run: |
        cat > nuget.config << EOF
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <add key="github" value="https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" />
          </packageSources>
          <packageSourceCredentials>
            <github>
              <add key="Username" value="${{ github.actor }}" />
              <add key="ClearTextPassword" value="${{ secrets.GITHUB_TOKEN }}" />
            </github>
          </packageSourceCredentials>
        </configuration>
        EOF

    - name: 'Install tool from GitHub Packages'
      run: |
        sleep 60
        dotnet tool install --global --configfile nuget.config Optivem.AtddAccelerator.TemplateGenerator

    - name: 'Test tool commands'
      run: |
        atdd
        atdd --help
        atdd --version

    - name: 'Cleanup'
      run: dotnet tool uninstall --global Optivem.AtddAccelerator.TemplateGenerator

  test-tool-installation-nuget:
    name: 'Test Installation from NuGet.org'
    runs-on: ubuntu-latest
    needs: publish-nuget
    if: github.event_name == 'release'  # Only test NuGet.org on releases
    
    steps:
    - name: 'Setup .NET'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 'Wait for NuGet.org indexing'
      run: sleep 120  # NuGet.org takes longer to index packages

    - name: 'Install tool from NuGet.org'
      run: |
        dotnet tool install --global Optivem.AtddAccelerator.TemplateGenerator

    - name: 'Test tool commands'
      run: |
        atdd
        atdd --help
        atdd --version

  attach-release-assets:
    name: 'Attach Package to Release'
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    
    steps:
    - name: 'Download package artifacts'
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

    - name: 'Get package file name'
      id: package-name
      run: |
        PACKAGE_FILE=$(ls ${{ env.PACKAGE_OUTPUT_DIRECTORY }}/*.nupkg | head -n 1)
        echo "package_file=$PACKAGE_FILE" >> $GITHUB_OUTPUT
        echo "package_name=$(basename $PACKAGE_FILE)" >> $GITHUB_OUTPUT

    - name: 'Upload Release Asset'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ${{ steps.package-name.outputs.package_file }}
        asset_name: ${{ steps.package-name.outputs.package_name }}
        asset_content_type: application/zip