name: release-stage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [published]

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'cli/Optivem.AtddAccelerator.TemplateGenerator.csproj'
  PACKAGE_OUTPUT_DIRECTORY: ${{ github.workspace }}/output

jobs:
  build:
    name: 'Build and Test'
    runs-on: ubuntu-latest
    
    steps:
    - name: 'Checkout'
      uses: actions/checkout@v4

    - name: 'Setup .NET'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 'Restore dependencies'
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: 'Build'
      run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

    - name: 'Pack'
      run: dotnet pack ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

    - name: 'Upload package artifacts'
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ${{ env.PACKAGE_OUTPUT_DIRECTORY }}/*.nupkg

  publish-github-packages:
    name: 'Publish to GitHub Packages'
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    
    steps:
    - name: 'Download package artifacts'
      uses: actions/download-artifact@v4
      with:
        name: nuget-packages
        path: ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

    - name: 'Setup .NET'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 'Publish to GitHub Packages'
      run: |
        dotnet nuget push ${{ env.PACKAGE_OUTPUT_DIRECTORY }}/*.nupkg \
          --api-key ${{ secrets.GITHUB_TOKEN }} \
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
          --skip-duplicate

  test-tool-installation:
    name: 'Test Tool Installation from GitHub Packages'
    runs-on: ubuntu-latest
    needs: publish-github-packages
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    
    steps:
    - name: 'Setup .NET'
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: 'Install tool from GitHub Packages'
      run: |
        # Add GitHub Packages source
        dotnet nuget add source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --name github
        
        # Wait a moment for package to be available
        sleep 30
        
        # Install the tool
        dotnet tool install --global --add-source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json Optivem.AtddAccelerator.TemplateGenerator
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 'Test tool commands'
      run: |
        atdd
        atdd --help
        atdd --version